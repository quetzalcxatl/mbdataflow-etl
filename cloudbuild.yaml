# ============================================================
# MBDataFlow_ETL — Cloud Build configuration
# Triggered manually or via GitHub push to main.
# Builds the shared pipeline image and pushes to Artifact Registry.
# ============================================================

substitutions:
  _REGION: us-central1
  _REPO: mbdataflow
  _IMAGE: etl-pipelines

steps:
  # ── Step 1: Build the image ──────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:$SHORT_SHA
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:latest
      - .

  # ── Step 2: Push both tags ───────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:$SHORT_SHA
    waitFor: [build]

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:latest
    waitFor: [build]

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_IMAGE:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM_2